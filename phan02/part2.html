<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APTIS Speaking Part 2</title>

<link rel="stylesheet" href="style.css">

<!-- GIỮ NGUYÊN TOÀN BỘ STYLE CỦA BẠN -->
<style>
/* ===== TOP BAR ===== */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 16px;
    background:#1e3a8a;
    color:#fff;
    flex-wrap:wrap;
}
.top-bar .left{
    font-weight:bold;
    font-size:16px;
}
.top-bar .actions{
    display:flex;
    gap:8px;
}
.top-bar .actions a,
.top-bar .actions button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:#fff;
    color:#1e3a8a;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
    font-size:14px;
}

/* ===== CONTENT ===== */
.container{
    max-width:900px;
    margin:30px auto;
    padding:0 15px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.timer{
    text-align:center;
    font-size:34px;
    font-weight:bold;
    color:#1e3a8a;
    margin:20px 0;
}

.image-box{
    text-align:center;
    margin-bottom:25px;
}

.image-box img{
    max-width:100%;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.question{
    background:#f1f5ff;
    padding:18px;
    border-radius:10px;
    margin-bottom:15px;
    font-size:20px;
}

.controls{
    text-align:center;
    margin-top:20px;
}

.controls button{
    padding:14px 24px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#1e3a8a;
    color:#fff;
    cursor:pointer;
}

.result-box{
    margin-top:30px;
}

.result-box audio{
    width:100%;
    margin:10px 0;
}

/* MOBILE */
@media(max-width:600px){
    .question{
        font-size:21px;
    }
    .timer{
        font-size:40px;
    }
}
</style>
</head>

<body>

<div class="top-bar">
    <div class="left">
        APTIS Speaking – Part 2
    </div>
    <div class="actions">
        <a href="part2-select.html">⬅ Danh sách bài</a>
        <a href="../index.html">🏠 Trang chủ</a>
        <button id="logoutBtn">🚪 Đăng xuất</button>
    </div>
</div>

<div class="container">

    <h1 id="testTitle">Practice Test</h1>

    <div class="timer" id="timer">45</div>

    <div class="image-box">
        <img id="testImage" src="" alt="Part 2 Image">
    </div>

    <div id="questionBox" class="question"></div>

    <div class="controls">
        <button id="startBtn">Start Test</button>
    </div>

    <div id="resultBox" class="result-box"></div>

</div>

<!-- LOAD DATA -->
<script src="part2-data.js"></script>

<!-- LOAD LOGIC PRO -->
<script src="app2.js"></script>

</body>
</html>
